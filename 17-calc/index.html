<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>17-calc</title>
		<link rel="stylesheet" href="/styles.css" />
		<script src="app.js" defer></script>
	</head>
	<body>
		<div class="container">
			<div class="row">
				<label class="textLabel">Введите первое число</label>
				<input class="inputNumber firstInput" type="number" />
			</div>

			<div class="row">
				<label class="textLabel">Введите второе число</label>
				<input class="inputNumber secondInput" type="number" />
			</div>
			<div class="operations">
				<button class="button buttonForAddition">&plus;</button>
				<button class="button buttonForSubtraction">&#45;</button>
				<button class="button buttonForMultiplication">&midast;</button>
				<button class="button buttonForDivision">&sol;</button>
			</div>
			<div class="result"></div>
		</div>
	</body>
</html>
